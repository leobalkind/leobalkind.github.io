<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1a0f2e"/>
      <stop offset="1" stop-color="#0a0716"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="24" fill="url(#bg)"/>
  <!-- pug face -->
  <g transform="translate(96,96)">
    <!-- ears -->
    <rect x="-44" y="-44" width="20" height="20" fill="#6b3a1c"/>
    <rect x="24" y="-44" width="20" height="20" fill="#6b3a1c"/>
    <!-- head -->
    <rect x="-44" y="-30" width="88" height="60" fill="#c8854a"/>
    <rect x="-44" y="-30" width="88" height="10" fill="#e0a566"/>
    <!-- mask -->
    <rect x="-32" y="-10" width="64" height="36" fill="#1a0d05"/>
    <!-- eyes -->
    <rect x="-22" y="-4" width="10" height="10" fill="#fff"/>
    <rect x="12" y="-4" width="10" height="10" fill="#fff"/>
    <rect x="-18" y="0" width="6" height="6" fill="#000"/>
    <rect x="14" y="0" width="6" height="6" fill="#000"/>
    <!-- tongue -->
    <rect x="-6" y="18" width="12" height="10" fill="#ff5a82"/>
  </g>
  <!-- neon glow corners -->
  <circle cx="32" cy="32" r="6" fill="#ff3aa1"/>
  <circle cx="160" cy="32" r="6" fill="#4cc9f0"/>
  <circle cx="32" cy="160" r="6" fill="#5ef38c"/>
  <circle cx="160" cy="160" r="6" fill="#ffd23f"/>
</svg>
